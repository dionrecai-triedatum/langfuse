name: Build & Push Patched Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-lockfile:
    name: Regenerate lockfile with security overrides
    runs-on: ubuntu-latest
    outputs:
      lockfile-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Regenerate lockfile with overrides
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Hash updated lockfile
        id: hash
        run: echo "hash=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload updated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: patched-lockfile
          path: pnpm-lock.yaml
          retention-days: 1

  build-web:
    name: Build langfuse (web)
    runs-on: ubuntu-latest
    needs: update-lockfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download updated lockfile
        uses: actions/download-artifact@v4
        with:
          name: patched-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dionrecai909td
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: dionrecai909td/langfuse:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-worker:
    name: Build langfuse-worker
    runs-on: ubuntu-latest
    needs: update-lockfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download updated lockfile
        uses: actions/download-artifact@v4
        with:
          name: patched-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dionrecai909td
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./worker/Dockerfile
          push: true
          tags: dionrecai909td/langfuse-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
